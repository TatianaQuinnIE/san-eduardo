<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Wheat Gold — Accent (bright)</span><div class="row"><div class="sw" style="background:#E0A92A;color:#fff"><b>600</b><span>#E0A92A</span></div><div class="sw" style="background:#F2C53D;color:var(--ink-900)"><b>500</b><span>#F2C53D</span></div><div class="sw" style="background:#F7D976;color:var(--ink-900)"><b>300</b><span>#F7D976</span></div><div class="sw" style="background:#FCF1CE;color:var(--ink-900)"><b>100</b><span>#FCF1CE</span></div></div></body></html>
