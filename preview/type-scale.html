<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Type Scale</span>
<div style="display:flex;flex-direction:column;gap:7px">
<div style="display:flex;align-items:baseline;gap:14px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:64px">H1 · 56</span><span style="font-family:var(--font-display);font-weight:800;font-size:40px;letter-spacing:-0.03em">Vaquillonas</span></div>
<div style="display:flex;align-items:baseline;gap:14px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:64px">H3 · 28</span><span style="font-weight:700;font-size:22px">Auditoría de reglas</span></div>
<div style="display:flex;align-items:baseline;gap:14px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:64px">Body · 16</span><span style="font-size:15px;color:var(--ink-700)">Análisis de inteligencia ganadera sobre cinco años de datos.</span></div>
</div></body></html>
