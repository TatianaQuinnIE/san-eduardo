<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Surfaces — Bone & Cream</span><div class="row"><div class="sw" style="background:#F2EEE3;color:var(--ink-900)"><b>bone</b><span>#F2EEE3</span></div><div class="sw" style="background:#FBF8F1;color:var(--ink-900)"><b>cream</b><span>#FBF8F1</span></div><div class="sw" style="background:#FFFFFF;color:var(--ink-900)"><b>paper</b><span>#FFFFFF</span></div><div class="sw" style="background:#EDE2CF;color:var(--ink-900)"><b>sand</b><span>#EDE2CF</span></div></div></body></html>
