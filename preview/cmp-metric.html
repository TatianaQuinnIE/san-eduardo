<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bone);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Metric Card</span>
<div style="display:flex;gap:14px">
<div style="background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--clay-500);border-radius:14px;padding:18px 20px;flex:1">
<div style="font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px">Consistencia general</div>
<div style="font-family:var(--font-display);font-weight:800;font-size:42px;line-height:0.9;letter-spacing:-0.04em;color:var(--ink-900)">49%</div>
<div style="font-size:12px;color:var(--ink-500);margin-top:5px">regla vs. decisiones</div></div>
<div style="background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--green-500);border-radius:14px;padding:18px 20px;flex:1">
<div style="font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-500);margin-bottom:8px">Registros de IHM</div>
<div style="font-family:var(--font-display);font-weight:800;font-size:42px;line-height:0.9;letter-spacing:-0.04em;color:var(--ink-900)">5.265</div>
<div style="font-size:12px;color:var(--ink-500);margin-top:5px">2022–2026</div></div>
</div></body></html>
