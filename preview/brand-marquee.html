<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--forest-900);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl" style="color:rgba(251,247,240,0.7)">Marquee Ticker</span>
<div style="background:var(--clay-500);border-radius:10px;padding:14px 18px;overflow:hidden;white-space:nowrap">
<span style="font-family:var(--font-display);font-style:italic;font-weight:800;font-size:24px;letter-spacing:-0.01em;color:var(--cream)">Angus-Cruza <span style="font-style:normal;font-weight:400;font-size:12px;color:var(--gold-300);margin:0 18px">✦</span> Pampa Húmeda <span style="font-style:normal;font-weight:400;font-size:12px;color:var(--gold-300);margin:0 18px">✦</span> Bragado · BA <span style="font-style:normal;font-weight:400;font-size:12px;color:var(--gold-300);margin:0 18px">✦</span> Selección Genética</span>
</div></body></html>
