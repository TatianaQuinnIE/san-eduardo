<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bone);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Telemetry Panel</span>
<div style="background:var(--forest-900);border-radius:16px;padding:18px 22px">
<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(149,213,178,0.18);padding-bottom:10px;margin-bottom:12px"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--green-300)">Panel de telemetría</span><span style="font-family:var(--font-mono);font-size:9px;color:rgba(251,247,240,0.6)">● LIVE</span></div>
<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:9px"><span style="font-family:var(--font-mono);font-size:11px;color:rgba(251,247,240,0.62)">Precisión @30%</span><span style="flex:1;border-bottom:1px dotted rgba(149,213,178,0.3);transform:translateY(-3px)"></span><span style="font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-0.03em;color:var(--gold-300)">35%</span></div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:9px"><span style="font-family:var(--font-mono);font-size:11px;color:rgba(251,247,240,0.62)">Selección al azar</span><span style="flex:1;border-bottom:1px dotted rgba(149,213,178,0.3);transform:translateY(-3px)"></span><span style="font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-0.03em;color:var(--gold-300)">30%</span></div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:9px"><span style="font-family:var(--font-mono);font-size:11px;color:rgba(251,247,240,0.62)">Población</span><span style="flex:1;border-bottom:1px dotted rgba(149,213,178,0.3);transform:translateY(-3px)"></span><span style="font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-0.03em;color:var(--gold-300)">337</span></div>
</div></body></html>
