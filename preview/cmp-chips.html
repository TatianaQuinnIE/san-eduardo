<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;border:none;border-radius:999px;padding:11px 22px;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

</style></head><body><span class="lbl">Chips · Pills · Tabs</span>
<div class="row" style="margin-bottom:12px">
<span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--green-500);background:var(--green-100);border:1px solid rgba(45,106,79,0.18);padding:6px 12px;border-radius:999px">Machine Learning</span>
<span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--ink-700);background:var(--cream);border:1px solid var(--line);padding:6px 12px;border-radius:999px">📍 Bragado</span>
</div>
<div class="row" style="margin-bottom:12px">
<span style="font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--ok-wash);color:var(--green-500);padding:4px 10px;border-radius:999px">COMPLETO</span>
<span style="font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--warn-wash);color:var(--gold-600);padding:4px 10px;border-radius:999px">PARCIAL</span>
<span style="font-family:var(--font-mono);font-size:10px;font-weight:700;background:var(--alert-wash);color:var(--alert);padding:4px 10px;border-radius:999px">FALTANTE</span>
</div>
<div class="row">
<span style="font-size:13px;font-weight:700;background:var(--green-500);color:var(--cream);padding:8px 16px;border-radius:999px">Tu Rodeo</span>
<span style="font-size:13px;font-weight:600;color:var(--ink-700);padding:8px 16px">Auditoría</span>
</div></body></html>
