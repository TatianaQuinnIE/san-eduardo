<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Corner Radii</span><div class="row" style="gap:16px">
<div style="text-align:center"><div style="width:80px;height:56px;background:var(--clay-100);border:1px solid var(--clay-300);border-radius:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:6px">sm · 8px</div></div><div style="text-align:center"><div style="width:80px;height:56px;background:var(--clay-100);border:1px solid var(--clay-300);border-radius:14px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:6px">md · 14px</div></div><div style="text-align:center"><div style="width:80px;height:56px;background:var(--clay-100);border:1px solid var(--clay-300);border-radius:22px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:6px">lg · 22px</div></div><div style="text-align:center"><div style="width:80px;height:56px;background:var(--clay-100);border:1px solid var(--clay-300);border-radius:32px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:6px">xl · 32px</div></div>
<div style="text-align:center"><div style="width:80px;height:56px;background:var(--clay-100);border:1px solid var(--clay-300);border-radius:999px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:6px">pill</div></div>
</div></body></html>
