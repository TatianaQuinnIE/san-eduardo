<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}
body{background:var(--bone)}
</style></head><body><span class="lbl">Elevation</span><div class="row" style="gap:22px;padding:6px 2px 14px">
<div style="text-align:center"><div style="width:120px;height:60px;background:var(--paper);border-radius:14px;box-shadow:var(--sh-1)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:10px">sh-1</div></div><div style="text-align:center"><div style="width:120px;height:60px;background:var(--paper);border-radius:14px;box-shadow:var(--sh-2)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:10px">sh-2</div></div><div style="text-align:center"><div style="width:120px;height:60px;background:var(--paper);border-radius:14px;box-shadow:var(--sh-3)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:10px">sh-3</div></div>
</div></body></html>
