<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Spacing Scale · 8pt base</span><div style="display:flex;flex-direction:column;gap:8px">
<div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">4</span><div style="height:12px;width:8px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">8</span><div style="height:12px;width:16px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">16</span><div style="height:12px;width:32px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">24</span><div style="height:12px;width:48px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">32</span><div style="height:12px;width:64px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">48</span><div style="height:12px;width:96px;background:var(--clay-400);border-radius:3px"></div></div><div style="display:flex;align-items:center;gap:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);width:34px">64</span><div style="height:12px;width:128px;background:var(--clay-400);border-radius:3px"></div></div>
</div></body></html>
