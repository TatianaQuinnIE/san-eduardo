<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;border:none;border-radius:999px;padding:11px 22px;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

</style></head><body><span class="lbl">Buttons</span><div class="row">
<button class="btn" style="background:var(--gold-500);color:var(--ink-900);box-shadow:0 6px 20px rgba(212,160,23,0.35)">Explorar →</button>
<button class="btn" style="background:var(--clay-500);color:var(--cream)">Ver dashboard</button>
<button class="btn" style="background:transparent;color:var(--clay-500);border:1.5px solid var(--clay-300)">Secundario</button>
<button class="btn" style="background:var(--green-500);color:var(--cream)">Acción</button>
</div>
<div class="row" style="margin-top:12px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500)">gold (primary) · clay (solid) · outline · green &middot; pill radius · hover lifts</span></div></body></html>
