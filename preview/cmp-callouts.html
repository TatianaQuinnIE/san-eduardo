<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;border:none;border-radius:999px;padding:11px 22px;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

</style></head><body><span class="lbl">Callouts / Notes</span>
<div style="position:relative;background:var(--ok-wash);border-radius:12px;padding:12px 16px 12px 18px;margin-bottom:9px;overflow:hidden"><span style="position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green-500)"></span><span style="font-weight:700;font-size:13px">Hallazgo accionable</span></div><div style="position:relative;background:var(--warn-wash);border-radius:12px;padding:12px 16px 12px 18px;margin-bottom:9px;overflow:hidden"><span style="position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold-500)"></span><span style="font-weight:700;font-size:13px">Limitación documentada</span></div><div style="position:relative;background:var(--alert-wash);border-radius:12px;padding:12px 16px 12px 18px;margin-bottom:9px;overflow:hidden"><span style="position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--alert)"></span><span style="font-weight:700;font-size:13px">Brecha de datos crítica</span></div></body></html>
