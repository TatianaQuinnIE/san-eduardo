<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-body);font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Display · Hanken Grotesk Black</span>
<div style="font-family:var(--font-display);font-weight:800;font-size:60px;line-height:0.92;letter-spacing:-0.04em;color:var(--ink-900)">El rodeo, <em style="font-style:italic;color:var(--clay-500)">leído</em></div>
<div class="row" style="margin-top:14px;font-size:11px;color:var(--ink-500);gap:20px;font-weight:600"><span>Display 88 / H1 56 / H2 40</span><span>weight 800–900 · italic accents</span></div></body></html>
