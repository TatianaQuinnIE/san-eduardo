<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Pasture / Clover Green — Secondary</span><div class="row"><div class="sw" style="background:#0D2B1F;color:#fff"><b>900</b><span>#0D2B1F</span></div><div class="sw" style="background:#1B4332;color:#fff"><b>700</b><span>#1B4332</span></div><div class="sw" style="background:#2D6A4F;color:#fff"><b>500</b><span>#2D6A4F</span></div><div class="sw" style="background:#418A68;color:#fff"><b>400</b><span>#418A68</span></div><div class="sw" style="background:#95D5B2;color:var(--ink-900)"><b>300</b><span>#95D5B2</span></div><div class="sw" style="background:#DCEFE4;color:var(--ink-900)"><b>100</b><span>#DCEFE4</span></div></div></body></html>
