<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}
.btn{font-family:var(--font-body);font-weight:600;font-size:14px;border:none;border-radius:999px;padding:11px 22px;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

</style></head><body><span class="lbl">Logo Mark — variants</span>
<div class="row" style="gap:0">
<div style="flex:1;background:var(--cream);display:flex;align-items:center;justify-content:center;padding:18px;border-radius:12px 0 0 12px"><img src="../assets/logo-mark-terracotta.png" style="height:66px"></div>
<div style="flex:1;background:var(--bone);display:flex;align-items:center;justify-content:center;padding:18px"><img src="../assets/logo-mark-forest.png" style="height:66px"></div>
<div style="flex:1;background:var(--forest-900);display:flex;align-items:center;justify-content:center;padding:18px;border-radius:0 12px 12px 0"><img src="../assets/logo-mark-cream.png" style="height:66px"></div>
</div>
<div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-500);margin-top:10px">Cattle-brand mark · recolorable · text-free</div></body></html>
