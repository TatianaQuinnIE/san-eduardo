<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink-900);padding:22px 26px;-webkit-font-smoothing:antialiased}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{border-radius:10px;height:62px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(44,26,14,0.06)}
.sw b{font-family:var(--font-mono);font-size:10px;font-weight:700}
.sw span{font-family:var(--font-mono);font-size:9px;opacity:0.7}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px;display:block}

</style></head><body><span class="lbl">Semantic — Status</span><div class="row">
<div class="sw" style="background:var(--ok-wash);border-left:4px solid var(--ok)"><b style="color:var(--ok)">OK</b><span style="color:var(--green-500)">Completo</span></div>
<div class="sw" style="background:var(--warn-wash);border-left:4px solid var(--warn)"><b style="color:var(--gold-600)">WARN</b><span style="color:var(--gold-600)">Parcial</span></div>
<div class="sw" style="background:var(--alert-wash);border-left:4px solid var(--alert)"><b style="color:var(--alert)">ALERT</b><span style="color:var(--alert)">Faltante</span></div>
</div></body></html>
